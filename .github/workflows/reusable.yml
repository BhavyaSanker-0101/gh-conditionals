name: Reusable deploy
on: 
  workflow_call:
    inputs:
      artifact-name:
        description: "the name of deployable artifact files"
        default: "dist"
        type: string
        # secrets:
        #   some-secret:
        #     required: false
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: get code
        uses: actions/download-artifact@v4
        with:
          name: ${{ inputs.artifact-name }}
      - name: list files
        run: ls
      - name: output info
        run: echo "deploying and uploading"
      
